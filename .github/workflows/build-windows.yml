name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: get_version
        shell: python
        run: |
          import re, os
          content = open("pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          version = m.group(1) if m else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # flet[all] provides both the desktop client and the `flet` CLI
          # (flet-cli) used by `flet pack`; flet pack wraps PyInstaller.
          pip install "flet[all]==0.28.3"
          pip install pyinstaller

      - name: Build executable with flet pack
        run: |
          flet pack src/ringcentral_csv_editor/__main__.py `
            --name ringcentral-csv-editor `
            --icon logo.png `
            --product-name "RingCentral CSV Editor" `
            --product-version "${{ steps.get_version.outputs.version }}" `
            --company-name "Ripped-Kanga" `
            --copyright "Ripped-Kanga"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: iscc "/DMyAppVersion=${{ steps.get_version.outputs.version }}" installer.iss

      - name: Upload installer and exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ringcentral-csv-editor.exe
            dist/ringcentral-csv-editor-${{ steps.get_version.outputs.version }}-setup.exe

      - name: Upload installer as artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.get_version.outputs.version }}
          path: |
            dist/ringcentral-csv-editor.exe
            dist/ringcentral-csv-editor-${{ steps.get_version.outputs.version }}-setup.exe
