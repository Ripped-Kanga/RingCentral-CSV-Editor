name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: get_version
        shell: python
        run: |
          import re, os
          content = open("pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          version = m.group(1) if m else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --name ringcentral-csv-editor `
            --add-data "src/ringcentral_csv_editor/styles;ringcentral_csv_editor/styles" `
            --add-data "src/ringcentral_csv_editor/assets;ringcentral_csv_editor/assets" `
            src/ringcentral_csv_editor/__main__.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: iscc "/DMyAppVersion=${{ steps.get_version.outputs.version }}" installer.iss

      - name: Upload installer and exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ringcentral-csv-editor.exe
            dist/ringcentral-csv-editor-${{ steps.get_version.outputs.version }}-setup.exe

      - name: Upload installer as artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.get_version.outputs.version }}
          path: |
            dist/ringcentral-csv-editor.exe
            dist/ringcentral-csv-editor-${{ steps.get_version.outputs.version }}-setup.exe
